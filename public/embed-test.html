<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Embed test — iframe (same-origin)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        background: #22c55e;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Host page</h1>
    <p>
      Manual iframe (partner-style). Widget bottom-right. Use
      <code>http://localhost:3000/embed-test.html</code> — not
      <code>file://</code>.
    </p>
    <iframe
      id="kavisha-widget"
      title="Kavisha chat"
      allow="clipboard-write"
      src="/widget?brand=entrackr"
      style="position:fixed;right:24px;bottom:24px;width:72px;height:72px;border:0;z-index:2147483647;background:transparent;"
    ></iframe>
    <script>
      (function () {
        var iframe = document.getElementById("kavisha-widget");
        var trusted = new URL(iframe.src, location.href).origin;

        window.addEventListener("message", function (e) {
          if (e.source !== iframe.contentWindow || e.origin !== trusted) return;
          var d = e.data;
          if (!d || d.source !== "kavisha-widget") return;
          if (typeof d.width === "number" && typeof d.height === "number") {
            iframe.style.width = d.width + "px";
            iframe.style.height = d.height + "px";
          }
        });
      })();
    </script>
  </body>
</html>
