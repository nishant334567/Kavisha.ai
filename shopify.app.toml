# Deploy config: npx shopify app deploy
# Docs: https://shopify.dev/docs/apps/build/compliance/privacy-law-compliance

name = "Kavisha AI"
client_id = "fed932215a401c375dcd1885b4896ca1"
application_url = "https://kavisha.ai/api/shopify/auth"
embedded = false

[access_scopes]
scopes = "read_products,read_product_listings,read_inventory"

[auth]
redirect_urls = [
  "https://kavisha.ai/api/shopify/callback",
]

[webhooks]
api_version = "2026-04"

# Mandatory App Store compliance webhooks — all handled by app/api/shopify/webhooks/route.js
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "https://kavisha.ai/api/shopify/webhooks"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "https://kavisha.ai/api/shopify/webhooks"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "https://kavisha.ai/api/shopify/webhooks"

[build]
automatically_update_urls_on_dev = false
